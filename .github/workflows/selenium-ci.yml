name: Selenium CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-tests:
    name: Smoke tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chrome
          - firefox

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run smoke suite on ${{ matrix.browser }}
        run: mvn -B clean test -Dbrowser=${{ matrix.browser }} -DsuiteXmlFile=testng-smoke.xml

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/
          if-no-files-found: warn
          retention-days: 30
